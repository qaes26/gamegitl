<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مهمة حب لرهف</title>
    
    <!-- تحميل المكتبات اللازمة لتشغيل اللعبة -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #171717; overflow: hidden; }
        * { touch-action: manipulation; } /* لمنع التكبير عند النقر المزدوج على الهاتف */
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // أيقونات بصيغة SVG لتعمل في ملف واحد
        const HeartIcon = ({ className, fill }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={fill || "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
            </svg>
        );

        const ClockIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
        );

        // إعدادات اللعبة
        const GRID_SIZE = 6;
        const WALLS = [
            { x: 1, y: 1 }, { x: 1, y: 2 }, { x: 1, y: 3 },
            { x: 3, y: 0 }, { x: 3, y: 1 },
            { x: 4, y: 4 }, { x: 3, y: 4 }
        ];
        const START_POS = { x: 0, y: 0 };
        const TARGET_POS = { x: 5, y: 5 };

        function App() {
            const [gameState, setGameState] = useState('start');
            const [playerPos, setPlayerPos] = useState(START_POS);
            const [timeElapsed, setTimeElapsed] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });

            const isWall = (x, y) => WALLS.some(w => w.x === x && w.y === y);

            const movePlayer = useCallback((dx, dy) => {
                if (gameState !== 'playing') return;
                setPlayerPos(prev => {
                    const newX = prev.x + dx;
                    const newY = prev.y + dy;
                    if (newX >= 0 && newX < GRID_SIZE && newY >= 0 && newY < GRID_SIZE && !isWall(newX, newY)) {
                        if (newX === TARGET_POS.x && newY === TARGET_POS.y) {
                            setTimeout(() => setGameState('win'), 300);
                        }
                        return { x: newX, y: newY };
                    }
                    return prev;
                });
            }, [gameState]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    switch(e.key) {
                        case 'ArrowUp': movePlayer(0, -1); break;
                        case 'ArrowDown': movePlayer(0, 1); break;
                        case 'ArrowLeft': movePlayer(-1, 0); break;
                        case 'ArrowRight': movePlayer(1, 0); break;
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [movePlayer]);

            useEffect(() => {
                if (gameState === 'win') {
                    // تاريخ البداية
                    const startDate = new Date('2025-11-23T00:00:00');
                    
                    const updateTimer = () => {
                        const now = new Date();
                        const diff = now - startDate;

                        if (diff > 0) {
                            setTimeElapsed({
                                days: Math.floor(diff / (1000 * 60 * 60 * 24)),
                                hours: Math.floor((diff / (1000 * 60 * 60)) % 24),
                                minutes: Math.floor((diff / 1000 / 60) % 60),
                                seconds: Math.floor((diff / 1000) % 60)
                            });
                        }
                    };
                    updateTimer();
                    const interval = setInterval(updateTimer, 1000);
                    return () => clearInterval(interval);
                }
            }, [gameState]);

            const startGame = () => {
                setPlayerPos(START_POS);
                setGameState('playing');
            };

            const renderGrid = () => {
                const cells = [];
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        const isPlayer = playerPos.x === x && playerPos.y === y;
                        const isTarget = TARGET_POS.x === x && TARGET_POS.y === y;
                        const isWallCell = isWall(x, y);

                        cells.push(
                            <div key={`${x}-${y}`} className={`w-full h-full flex items-center justify-center text-sm sm:text-lg border border-slate-800/20 ${isWallCell ? 'bg-slate-700' : 'bg-transparent'}`}>
                                {isPlayer && <span className="animate-bounce z-10 drop-shadow-md">🧑🏽</span>}
                                {isTarget && !isPlayer && <HeartIcon fill="currentColor" className="text-pink-500 animate-pulse w-5 h-5 sm:w-6 sm:h-6" />}
                                {isWallCell && <div className="w-full h-full bg-slate-600 rounded-sm shadow-inner" />}
                            </div>
                        );
                    }
                }
                return cells;
            };

            return (
                <div className="min-h-screen bg-neutral-900 flex items-center justify-center p-4 font-mono select-none">
                    <div className="relative w-full max-w-[360px] bg-pink-400 rounded-t-xl rounded-b-[3rem] p-4 sm:p-6 shadow-[0_20px_50px_rgba(236,72,153,0.3)] border-b-[12px] border-r-[8px] border-pink-600">
                        
                        <div className="flex justify-between px-2 mb-4 opacity-30">
                            <div className="w-16 h-1 bg-pink-900 rounded-full" />
                            <div className="w-16 h-1 bg-pink-900 rounded-full" />
                        </div>

                        <div className="bg-slate-800 p-4 sm:p-6 rounded-t-lg rounded-b-3xl shadow-inner border-b-4 border-slate-900 relative">
                            <div className="absolute left-2 top-1/2 -translate-y-1/2 flex flex-col items-center gap-1">
                                <div className="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)] animate-pulse" />
                                <span className="text-[8px] text-slate-400 font-sans tracking-tighter">BATT</span>
                            </div>

                            <div className="bg-[#8bac0f] aspect-square rounded-md shadow-[inset_0_0_15px_rgba(0,0,0,0.4)] relative overflow-hidden flex flex-col items-center justify-center border-2 border-slate-700">
                                
                                {gameState === 'start' && (
                                    <div className="text-center space-y-4 text-[#0f380f] p-4" dir="rtl">
                                        <HeartIcon className="w-12 h-12 mx-auto animate-bounce text-[#0f380f]" />
                                        <h1 className="text-xl font-bold font-sans">مهمة حب لرهف</h1>
                                        <p className="text-xs font-bold bg-[#0f380f] text-[#8bac0f] px-2 py-1 rounded">اضغط START للبدء</p>
                                    </div>
                                )}

                                {gameState === 'playing' && (
                                    <div className="w-full h-full grid p-1 gap-[1px]" style={{ gridTemplateColumns: `repeat(${GRID_SIZE}, minmax(0, 1fr))`, gridTemplateRows: `repeat(${GRID_SIZE}, minmax(0, 1fr))` }}>
                                        {renderGrid()}
                                    </div>
                                )}

                                {gameState === 'win' && (
                                    <div className="w-full h-full flex flex-col items-center justify-center p-2 text-[#0f380f] animate-in fade-in duration-1000" dir="rtl">
                                        <div className="text-center space-y-1 mb-3">
                                            <HeartIcon fill="currentColor" className="w-8 h-8 mx-auto animate-pulse text-[#0f380f]" />
                                            <p className="font-sans font-bold text-sm mt-2">أخيراً وصلت لقلبكِ!</p>
                                            <p className="text-[10px] font-bold">أنتِ أجمل صدفة، وأحلى قصة حب.. 💖</p>
                                        </div>

                                        <div className="w-full bg-[#0f380f] text-[#8bac0f] rounded-lg p-2 border border-[#8bac0f]/30">
                                            <div className="flex items-center justify-center gap-1 mb-2 border-b border-[#8bac0f]/30 pb-1">
                                                <ClockIcon className="w-3 h-3" />
                                                <span className="text-[9px] font-bold">معاً منذ 23/11/2025</span>
                                            </div>
                                            <div className="grid grid-cols-4 gap-1 text-center divide-x divide-x-reverse divide-[#8bac0f]/20">
                                                <div className="flex flex-col">
                                                    <span className="text-sm font-black">{timeElapsed.days}</span>
                                                    <span className="text-[8px]">يوم</span>
                                                </div>
                                                <div className="flex flex-col">
                                                    <span className="text-sm font-black">{timeElapsed.hours}</span>
                                                    <span className="text-[8px]">ساعة</span>
                                                </div>
                                                <div className="flex flex-col">
                                                    <span className="text-sm font-black">{timeElapsed.minutes}</span>
                                                    <span className="text-[8px]">دقيقة</span>
                                                </div>
                                                <div className="flex flex-col">
                                                    <span className="text-sm font-black">{timeElapsed.seconds}</span>
                                                    <span className="text-[8px]">ثانية</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div className="absolute inset-0 pointer-events-none opacity-10 bg-[repeating-linear-gradient(transparent,transparent_2px,#000_2px,#000_4px)]"></div>
                            </div>

                            <div className="text-center mt-2 text-slate-400 text-xs font-bold tracking-widest font-sans flex items-center justify-center gap-2">
                                <span className="text-pink-500 text-lg">♥</span>
                                من إعداد قيس جازي
                                <span className="text-pink-500 text-lg">♥</span>
                            </div>
                        </div>

                        {/* أزرار التحكم */}
                        <div className="mt-8 sm:mt-10 px-4 flex justify-between items-end">
                            <div className="relative w-24 h-24">
                                <div className="absolute inset-0 bg-pink-500 rounded-full blur-md opacity-20"></div>
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-8 h-24 bg-slate-800 rounded-md shadow-lg border-b-4 border-slate-900" />
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-24 h-8 bg-slate-800 rounded-md shadow-lg border-b-4 border-slate-900" />
                                
                                <button onClick={() => movePlayer(0, -1)} className="absolute top-0 left-1/2 -translate-x-1/2 w-8 h-8 focus:outline-none active:bg-slate-700 rounded-t-md z-10"></button>
                                <button onClick={() => movePlayer(0, 1)} className="absolute bottom-0 left-1/2 -translate-x-1/2 w-8 h-8 focus:outline-none active:bg-slate-700 rounded-b-md z-10"></button>
                                <button onClick={() => movePlayer(-1, 0)} className="absolute left-0 top-1/2 -translate-y-1/2 w-8 h-8 focus:outline-none active:bg-slate-700 rounded-l-md z-10"></button>
                                <button onClick={() => movePlayer(1, 0)} className="absolute right-0 top-1/2 -translate-y-1/2 w-8 h-8 focus:outline-none active:bg-slate-700 rounded-r-md z-10"></button>
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3 h-3 bg-slate-700 rounded-full z-0"></div>
                            </div>

                            <div className="flex gap-4 -rotate-12 mb-4">
                                <div className="flex flex-col items-center gap-1">
                                    <button onClick={startGame} className="w-12 h-12 bg-red-600 rounded-full shadow-[0_4px_0_rgb(153,27,27)] active:shadow-none active:translate-y-1 transition-all border-2 border-red-700 focus:outline-none"></button>
                                    <span className="text-pink-900 font-bold text-sm tracking-wider">B</span>
                                </div>
                                <div className="flex flex-col items-center gap-1 -mt-6">
                                    <button onClick={startGame} className="w-12 h-12 bg-red-600 rounded-full shadow-[0_4px_0_rgb(153,27,27)] active:shadow-none active:translate-y-1 transition-all border-2 border-red-700 focus:outline-none"></button>
                                    <span className="text-pink-900 font-bold text-sm tracking-wider">A</span>
                                </div>
                            </div>
                        </div>

                        <div className="mt-8 flex justify-center gap-6 mb-4">
                            <div className="flex flex-col items-center gap-1">
                                <button className="w-12 h-3 bg-slate-700 rounded-full shadow-inner rotate-[-20deg] active:bg-slate-600"></button>
                                <span className="text-pink-900 text-[10px] font-bold tracking-widest uppercase mt-1">Select</span>
                            </div>
                            <div className="flex flex-col items-center gap-1">
                                <button onClick={startGame} className="w-12 h-3 bg-slate-700 rounded-full shadow-inner rotate-[-20deg] active:bg-slate-600"></button>
                                <span className="text-pink-900 text-[10px] font-bold tracking-widest uppercase mt-1">Start</span>
                            </div>
                        </div>

                        <div className="absolute bottom-6 right-6 flex gap-2 -rotate-12 opacity-40">
                            <div className="w-1.5 h-12 bg-pink-900 rounded-full"></div>
                            <div className="w-1.5 h-12 bg-pink-900 rounded-full"></div>
                            <div className="w-1.5 h-12 bg-pink-900 rounded-full"></div>
                            <div className="w-1.5 h-12 bg-pink-900 rounded-full"></div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
